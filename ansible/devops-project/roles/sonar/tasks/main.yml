---
- name: Install Docker
  apt:
    name: docker.io
    state: present
    update_cache: yes

- name: Increase virtual memory for SonarQube
  sysctl:
    name: vm.max_map_count
    value: '262144'
    state: present
    reload: yes

- name: Start SonarQube Container
  docker_container:
    name: sonarqube
    image: sonarqube:latest
    state: started
    restart_policy: always
    ports:
      - "9000:9000"
